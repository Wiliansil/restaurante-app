<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050505;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #161616;
      border: 1px solid #2b2b2b;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #f0c38a;
    }

    p {
      color: #bdbdbd;
      margin-bottom: 24px;
    }

    .error {
      display: none;
      background: rgba(255, 80, 80, 0.12);
      color: #ff8c8c;
      border: 1px solid rgba(255, 80, 80, 0.25);
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d9d9d9;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid #303030;
      background: #232323;
      color: #fff;
      outline: none;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      background: #e4b57b;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin</h1>
    <p>Faça login para acessar o painel administrativo.</p>

    <div id="errorBox" class="error">Usuário ou senha inválidos.</div>

    <form method="POST" action="/admin/login">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('errorBox').style.display = 'block';
    }
  </script>
</body>
</html>
